
<canvas id="c" style="width:100%;display:block;cursor:grab;touch-action:none;border-radius:12px;"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('c');
const W = canvas.parentElement.offsetWidth || 680;
const H = Math.min(W * 0.8, 540);
canvas.width = W; canvas.height = H;

const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x1a2a35, 1);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2a35);

const camera = new THREE.PerspectiveCamera(42, W/H, 0.1, 100);
camera.position.set(0, 7.5, 1.0);
camera.lookAt(0, 0, 0);

// Lights
const ambient = new THREE.AmbientLight(0xfff5e8, 0.4);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xfff8f0, 0.6);
dirLight.position.set(4, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -8;
dirLight.shadow.camera.right = 8;
dirLight.shadow.camera.top = 8;
dirLight.shadow.camera.bottom = -8;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0xffe0c8, 0.25);
fillLight.position.set(-5, 5, -3);
scene.add(fillLight);

const topLight = new THREE.PointLight(0xffffff, 0.3, 30);
topLight.position.set(0, 9, 0);
scene.add(topLight);

// Ground
const plateGeo = new THREE.CylinderGeometry(7, 7, 0.08, 64);
const plateMat = new THREE.MeshLambertMaterial({color: 0x223040});
const plate = new THREE.Mesh(plateGeo, plateMat);
plate.position.y = -0.05;
plate.receiveShadow = true;
scene.add(plate);

// Màu kem hồng nhạt từ ảnh: #f5e8d8 ~ peach cream
const FLAN_COLOR = 0xf5e4cc;
const FLAN_COLOR2 = 0xf0dfc0;

function makeFlanMat() {
  return new THREE.MeshPhysicalMaterial({
    color: new THREE.Color(FLAN_COLOR),
    roughness: 0.55,
    metalness: 0.0,
    clearcoat: 0.2,
    clearcoatRoughness: 0.35,
    reflectivity: 0.15,
  });
}

const radius = 1.7;
const seg = 64;

function makeSphereGeo() { return new THREE.SphereGeometry(radius, seg, seg); }
function clonePos(geo) { return new Float32Array(geo.attributes.position.array); }

// Flan 1
const geo1 = makeSphereGeo();
const flan1 = new THREE.Mesh(geo1, makeFlanMat());
flan1.castShadow = true; flan1.receiveShadow = true;
scene.add(flan1);
const orig1 = clonePos(geo1);

// Flan 2
const geo2 = makeSphereGeo();
const flan2 = new THREE.Mesh(geo2, makeFlanMat());
flan2.castShadow = true; flan2.receiveShadow = true;
scene.add(flan2);
const orig2 = clonePos(geo2);

// Base positions (equilibrium)
const BASE_X = radius * 1.02;
const basePos = [
  new THREE.Vector3(-BASE_X, 0, 0),
  new THREE.Vector3( BASE_X, 0, 0)
];
flan1.position.copy(basePos[0]);
flan2.position.copy(basePos[1]);

// Subtle pink overlay
function makePinkOverlay() {
  const g = new THREE.SphereGeometry(radius * 1.002, 32, 32);
  const m = new THREE.MeshPhysicalMaterial({
    color: 0xffb8a0, transparent: true, opacity: 0.07,
    roughness: 0.4, side: THREE.FrontSide
  });
  return new THREE.Mesh(g, m);
}

// Highlight
function makeHighlight() {
  const g = new THREE.SphereGeometry(radius * 0.1, 16, 16);
  const m = new THREE.MeshBasicMaterial({color: 0xfff8f0, transparent: true, opacity: 0.35});
  const mesh = new THREE.Mesh(g, m);
  mesh.position.set(-radius*0.2, radius*0.65, radius*0.2);
  return mesh;
}

flan1.add(makePinkOverlay()); flan1.add(makeHighlight());
flan2.add(makePinkOverlay()); flan2.add(makeHighlight());

// === TOPPER: small pink ball on top ===
const TOPPER_RADIUS = 0.18;
const TOPPER_Y = radius + TOPPER_RADIUS * 0.85;

function makeTopper() {
  const g = new THREE.SphereGeometry(TOPPER_RADIUS, 32, 32);
  const m = new THREE.MeshPhysicalMaterial({
    color: 0xff8fab,
    roughness: 0.3,
    metalness: 0.0,
    clearcoat: 0.6,
    clearcoatRoughness: 0.1,
  });
  const mesh = new THREE.Mesh(g, m);
  mesh.castShadow = true;
  return mesh;
}

const topper1 = makeTopper();
const topper2 = makeTopper();

// Toppers are independent objects (not children of flan) so we can drag them
scene.add(topper1);
scene.add(topper2);

// Topper world positions
const topperPos = [
  new THREE.Vector3(-BASE_X, TOPPER_Y, 0),
  new THREE.Vector3( BASE_X, TOPPER_Y, 0)
];
topper1.position.copy(topperPos[0]);
topper2.position.copy(topperPos[1]);

const flans = [flan1, flan2];
const geos = [geo1, geo2];
const origs = [orig1, orig2];
const toppers = [topper1, topper2];

// State per flan
const state = [
  {wobble:0,wobbleDecay:0,wDir:new THREE.Vector2(1,0),
   scaleX:1,scaleY:1,scaleZ:1,scaleVelX:0,scaleVelY:0,scaleVelZ:0,
   vel:new THREE.Vector3(),pos:new THREE.Vector3(-BASE_X,0,0)},
  {wobble:0,wobbleDecay:0,wDir:new THREE.Vector2(1,0),
   scaleX:1,scaleY:1,scaleZ:1,scaleVelX:0,scaleVelY:0,scaleVelZ:0,
   vel:new THREE.Vector3(),pos:new THREE.Vector3(BASE_X,0,0)}
];

// Topper drag state
const topperState = [
  {dragging:false, vel:new THREE.Vector3(), pos: new THREE.Vector3(-BASE_X,TOPPER_Y,0)},
  {dragging:false, vel:new THREE.Vector3(), pos: new THREE.Vector3(BASE_X,TOPPER_Y,0)}
];

const raycaster = new THREE.Raycaster();
let hovered = -1;   // flan hovered
let hoveredTopper = -1;
let dragTopper = -1;
let dragFlan = -1;
let pressTimer = null;
let pressedIdx = -1;

// Drag plane at y=TOPPER_Y for topper drag, y=0 for flan drag
const dragPlane = new THREE.Plane();
const dragPt = new THREE.Vector3();

function getMouseNDC(cx, cy) {
  const rect = canvas.getBoundingClientRect();
  return new THREE.Vector2(((cx-rect.left)/W)*2-1, -((cy-rect.top)/H)*2+1);
}

function getHoveredTopper(cx, cy) {
  const m = getMouseNDC(cx, cy);
  raycaster.setFromCamera(m, camera);
  const hits = raycaster.intersectObjects(toppers, false);
  return hits.length > 0 ? toppers.indexOf(hits[0].object) : -1;
}

function getHoveredFlan(cx, cy) {
  const m = getMouseNDC(cx, cy);
  raycaster.setFromCamera(m, camera);
  const hits = raycaster.intersectObjects(flans, false);
  return hits.length > 0 ? flans.indexOf(hits[0].object) : -1;
}

function getPlanePoint(cx, cy, planeY) {
  const m = getMouseNDC(cx, cy);
  raycaster.setFromCamera(m, camera);
  dragPlane.set(new THREE.Vector3(0,1,0), -planeY);
  raycaster.ray.intersectPlane(dragPlane, dragPt);
  return dragPt.clone();
}

function pokeFlan(idx, strength) {
  const s = state[idx];
  s.wobble = Math.min(s.wobble + strength, 1.6);
  s.wobbleDecay = 0;
  s.wDir.set(Math.random()*2-1, Math.random()*2-1).normalize();
  s.scaleVelX += -0.13*strength;
  s.scaleVelY += 0.2*strength;
  s.scaleVelZ += -0.13*strength;
}

function onDown(cx, cy) {
  const ht = getHoveredTopper(cx, cy);
  if(ht >= 0) {
    dragTopper = ht;
    canvas.style.cursor = 'grabbing';
    return;
  }
  const hf = getHoveredFlan(cx, cy);
  if(hf >= 0) {
    dragFlan = hf;
    pressedIdx = hf;
    pokeFlan(hf, 0.7);
    pressTimer = setTimeout(()=>{ if(pressedIdx===hf) pokeFlan(hf,1.2); }, 300);
    canvas.style.cursor = 'grabbing';
  }
}

function onMove(cx, cy) {
  if(dragTopper >= 0) {
    const pt = getPlanePoint(cx, cy, TOPPER_Y);
    if(pt) {
      const ts = topperState[dragTopper];
      // Move topper freely
      ts.pos.x = pt.x;
      ts.pos.z = pt.z;
      ts.pos.y = TOPPER_Y;
      // Pull flan body toward topper XZ
      const fs = state[dragTopper];
      const base = basePos[dragTopper];
      const dx = pt.x - fs.pos.x;
      const dz = pt.z - fs.pos.z;
      // Spring force pulling flan toward topper
      fs.vel.x += dx * 0.12;
      fs.vel.z += dz * 0.12;
      pokeFlan(dragTopper, 0.25);
    }
    return;
  }
  if(dragFlan >= 0) return;

  const ht = getHoveredTopper(cx, cy);
  const hf = ht >= 0 ? -1 : getHoveredFlan(cx, cy);
  hoveredTopper = ht;
  hovered = hf;
  canvas.style.cursor = (ht >= 0 || hf >= 0) ? 'pointer' : 'default';
}

function onUp() {
  clearTimeout(pressTimer);
  dragTopper = -1;
  dragFlan = -1;
  pressedIdx = -1;
  canvas.style.cursor = 'default';
}

canvas.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
canvas.addEventListener('mousedown', e => onDown(e.clientX, e.clientY));
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('mouseleave', onUp);
canvas.addEventListener('dblclick', e => {
  const h = getHoveredFlan(e.clientX, e.clientY);
  if(h >= 0) pokeFlan(h, 1.4);
});
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); const t=e.touches[0]; onDown(t.clientX,t.clientY); },{passive:false});
canvas.addEventListener('touchmove', e=>{ e.preventDefault(); const t=e.touches[0]; onMove(t.clientX,t.clientY); },{passive:false});
canvas.addEventListener('touchend', e=>{ e.preventDefault(); onUp(); },{passive:false});

// Deform flan mesh
function deformFlan(geo, origPos, t, s) {
  const pos = geo.attributes.position;
  const w=s.wobble, wdx=s.wDir.x, wdz=s.wDir.y;
  const decay=Math.exp(-s.wobbleDecay*2.5);
  const sx=s.scaleX, sy=s.scaleY, sz=s.scaleZ;
  for(let i=0;i<pos.count;i++){
    const ox=origPos[i*3],oy=origPos[i*3+1],oz=origPos[i*3+2];
    const len=Math.sqrt(ox*ox+oy*oy+oz*oz)||1;
    const nx=ox/len,ny=oy/len,nz=oz/len;
    const proj=nx*wdx+nz*wdz;
    const wave=Math.sin(t*5-proj*3)*w*decay*0.055;
    const wave2=Math.sin(t*9-proj*5)*w*decay*0.018;
    pos.array[i*3]=ox*sx+nx*(wave+wave2);
    pos.array[i*3+1]=oy*sy+ny*wave*0.4;
    pos.array[i*3+2]=oz*sz+nz*(wave+wave2);
  }
  pos.needsUpdate=true;
  geo.computeVertexNormals();
}

function resolveCollision() {
  const p0 = state[0].pos, p1 = state[1].pos;
  const dx=p1.x-p0.x, dz=p1.z-p0.z;
  const dist=Math.sqrt(dx*dx+dz*dz);
  const minDist=radius*2.02;
  if(dist<minDist&&dist>0.001){
    const nx=dx/dist,nz=dz/dist,ov=(minDist-dist)*0.5;
    p0.x-=nx*ov; p0.z-=nz*ov;
    p1.x+=nx*ov; p1.z+=nz*ov;
    const rv=(state[0].vel.x-state[1].vel.x)*nx+(state[0].vel.z-state[1].vel.z)*nz;
    if(rv>0){
      const imp=rv*0.5;
      state[0].vel.x-=imp*nx; state[0].vel.z-=imp*nz;
      state[1].vel.x+=imp*nx; state[1].vel.z+=imp*nz;
      pokeFlan(0, Math.abs(rv)*0.4);
      pokeFlan(1, Math.abs(rv)*0.4);
    }
  }
}

const clock = new THREE.Clock();
let time = 0;
const SPRING_K = 6.0;   // spring pulling flan back to base
const TOPPER_SPRING = 10.0; // topper spring back to flan top
const DAMPING = 0.88;
const TOPPER_DAMPING = 0.84;
const WOBBLE_SPRING = 12;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.04);
  time += dt;

  for(let i=0;i<2;i++){
    const s = state[i];
    const ts = topperState[i];
    const base = basePos[i];

    // Spring flan back to base position
    const fx = (base.x - s.pos.x) * SPRING_K;
    const fz = (base.z - s.pos.z) * SPRING_K;
    s.vel.x += fx * dt;
    s.vel.z += fz * dt;
    s.vel.x *= DAMPING;
    s.vel.z *= DAMPING;
    s.pos.x += s.vel.x * dt * 60;
    s.pos.z += s.vel.z * dt * 60;

    flans[i].position.set(s.pos.x, 0, s.pos.z);

    // Idle micro-wobble
    if(s.wobble < 0.04){
      s.wobble = 0.035;
      s.wDir.set(Math.sin(time*0.5+i*2.1), Math.cos(time*0.4+i*1.7)).normalize();
    }
    s.wobbleDecay += dt * 1.8;
    s.wobble = Math.max(0.035, s.wobble - dt*0.55);
    if(s.wobble > 0.5) s.wobbleDecay = Math.min(s.wobbleDecay, 0.2);

    // Squash-stretch
    s.scaleVelX+=(1-s.scaleX)*WOBBLE_SPRING*dt;
    s.scaleVelY+=(1-s.scaleY)*WOBBLE_SPRING*dt;
    s.scaleVelZ+=(1-s.scaleZ)*WOBBLE_SPRING*dt;
    s.scaleVelX*=0.82; s.scaleVelY*=0.82; s.scaleVelZ*=0.82;
    s.scaleX+=s.scaleVelX*dt*8;
    s.scaleY+=s.scaleVelY*dt*8;
    s.scaleZ+=s.scaleVelZ*dt*8;
    s.scaleX=Math.max(0.88,Math.min(1.12,s.scaleX));
    s.scaleY=Math.max(0.88,Math.min(1.18,s.scaleY));
    s.scaleZ=Math.max(0.88,Math.min(1.12,s.scaleZ));

    deformFlan(geos[i], origs[i], time, s);

    // Topper: spring back to top of flan
    const targetX = s.pos.x;
    const targetZ = s.pos.z;
    const targetY = TOPPER_Y;

    if(dragTopper !== i) {
      // Spring topper back toward flan top
      const tsx = (targetX - ts.pos.x) * TOPPER_SPRING;
      const tsz = (targetZ - ts.pos.z) * TOPPER_SPRING;
      const tsy = (targetY - ts.pos.y) * TOPPER_SPRING;
      ts.vel.x += tsx * dt;
      ts.vel.y += tsy * dt;
      ts.vel.z += tsz * dt;
      ts.vel.x *= TOPPER_DAMPING;
      ts.vel.y *= TOPPER_DAMPING;
      ts.vel.z *= TOPPER_DAMPING;
      ts.pos.x += ts.vel.x * dt * 60;
      ts.pos.y += ts.vel.y * dt * 60;
      ts.pos.z += ts.vel.z * dt * 60;
    }

    toppers[i].position.set(ts.pos.x, ts.pos.y, ts.pos.z);
  }

  resolveCollision();
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', ()=>{
  const nw=canvas.parentElement.offsetWidth||680;
  const nh=Math.min(nw*0.8,540);
  renderer.setSize(nw,nh);
  camera.aspect=nw/nh;
  camera.updateProjectionMatrix();
});
</script>
